# ──────────────────────────────────────────────────────────────────────────────
# newrelic.ini — minimal New Relic Python agent config.
#
# This is intentionally bare: it enables the agent's automatic instrumentation
# (Django request/response, outbound `requests` calls, gunicorn workers) and
# nothing else. No custom attributes, metrics, or traces are recorded.
#
# The license key and app name are NOT hard-coded here — they come from the
# runtime environment (NEW_RELIC_LICENSE_KEY / NEW_RELIC_APP_NAME), which is
# injected via Railway's dashboard. The agent is wrapped onto gunicorn in
# entrypoint.sh via `newrelic-admin run-program`.
# ──────────────────────────────────────────────────────────────────────────────

[newrelic]

# license_key and app_name are supplied at runtime via NEW_RELIC_LICENSE_KEY
# and NEW_RELIC_APP_NAME environment variables.
app_name = Publive MCP

# Turn the agent on. Set NEW_RELIC_LICENSE_KEY to a real key to actually report.
monitor_mode = true

# Agent log goes to stderr so Railway/Docker captures it; info-level is plenty.
log_level = info
log_file = stderr

# Use TLS to the New Relic collector.
ssl = true

# Standard transaction tracing (slow transactions captured automatically).
transaction_tracer.enabled = true
transaction_tracer.transaction_threshold = apdex_f
transaction_tracer.record_sql = obfuscated

# Capture unhandled errors automatically.
error_collector.enabled = true

# Slow-query traces for outbound calls.
slow_sql.enabled = true

# Distributed tracing on, browser/JS injection off (this is an API server).
distributed_tracing.enabled = true
browser_monitoring.auto_instrument = false
